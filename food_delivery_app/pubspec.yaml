name: food_delivery_app
description: Customer-facing food delivery mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  fluttertoast: ^8.2.4
  lottie: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  badges: ^3.1.2
  image_picker: ^1.0.7
  url_launcher: ^6.2.4
  pusher_reverb_flutter: ^0.0.4
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/images/logo.png
    - assets/images/onboarding/
    - assets/images/onboarding/fresh_generated.png
    - assets/images/onboarding/restaurants_generated.png
    - assets/images/onboarding/tracking_generated.png
